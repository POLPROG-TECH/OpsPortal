# OpsPortal Manifest — Tool Registration
# Tools can be sourced from remote Git repos (production) or local paths (dev).

tools:
  releasepilot:
    display_name: ReleasePilot
    description: "Release notes generator — from git history to polished documents"
    integration_mode: subprocess_web
    icon: rocket
    color: "#4F46E5"
    enabled: true
    port: 8082
    startup_timeout: 30
    env: {}
    source:
      provider: github
      repository: POLPROG-TECH/ReleasePilot
      ref: v1.1.0
      package: releasepilot
      extras: [all]
      install_strategy: pip_git

  releaseboard:
    display_name: ReleaseBoard
    description: "Release readiness dashboard — track branch status across repos"
    integration_mode: subprocess_web
    icon: clipboard-check
    color: "#059669"
    enabled: true
    port: 8081
    config_file: releaseboard.json
    startup_timeout: 30
    env: {}
    source:
      provider: github
      repository: POLPROG-TECH/ReleaseBoard
      ref: v1.1.0
      package: releaseboard
      install_strategy: pip_git

  localesync:
    display_name: LocaleSync
    description: "Translation file sync — keep locale files consistent across projects"
    integration_mode: subprocess_web
    icon: globe
    color: "#0891B2"
    enabled: true
    port: 8083
    config_file: localesync.json
    cli_binary: locale-sync
    startup_timeout: 30
    env: {}
    source:
      provider: github
      repository: POLPROG-TECH/LocaleSync
      ref: v1.1.0
      package: locale-sync
      install_strategy: pip_git

  flowboard:
    display_name: FlowBoard
    description: "Delivery intelligence dashboards — from Jira data to actionable insights"
    integration_mode: subprocess_web
    icon: bar-chart-2
    color: "#2563EB"
    enabled: true
    port: 8084
    config_file: flowboard.json
    startup_timeout: 30
    env: {}
    source:
      provider: github
      repository: POLPROG-TECH/FlowBoard
      ref: v1.0.0
      package: flowboard
      install_strategy: pip_git

  appsecone:
    display_name: AppSecOne
    description: "Security posture dashboard — release readiness powered by Fortify SSC"
    integration_mode: subprocess_web
    icon: shield
    color: "#DC2626"
    enabled: true
    port: 8085
    config_file: appsecone.json
    startup_timeout: 30
    env: {}
    source:
      provider: github
      repository: POLPROG-TECH/AppSecOne
      ref: v1.0.0
      package: appsecone
      install_strategy: pip_git