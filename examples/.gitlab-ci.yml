# =============================================================================
# OpsPortal - GitLab CI/CD Pipeline (example)
# =============================================================================

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PYTHON_VERSION: "3.13"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"

stages:
  - lint
  - test
  - build
  - deploy

# ── Cache ────────────────────────────────────────────────────
.python-cache: &python-cache
  cache:
    key: "$CI_COMMIT_REF_SLUG-pip"
    paths:
      - .pip-cache/
      - .venv/

# ── Lint ─────────────────────────────────────────────────────
lint:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  <<: *python-cache
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --quiet -e ".[dev]"
  script:
    - ruff check src/ tests/
    - ruff format --check src/ tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Tests ────────────────────────────────────────────────────
test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  <<: *python-cache
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --quiet -e ".[dev]"
  script:
    - pytest tests/ -v --tb=short --junitxml=report.xml --cov=opsportal --cov-report=xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Build Docker image ───────────────────────────────────────
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --tag "$IMAGE_TAG" --tag "$IMAGE_LATEST" .
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Deploy to staging (example - adjust for your infra) ─────
deploy:staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://opsportal-staging.example.com
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying $IMAGE_TAG to staging..."
    - echo "Deployment complete."
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  needs:
    - build
    - test

# ── Deploy to production (manual gate) ──────────────────────
deploy:production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://opsportal.example.com
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying $IMAGE_TAG to production..."
    - echo "Deployment complete."
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
  needs:
    - build
    - test
